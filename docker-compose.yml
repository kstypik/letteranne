services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    container_name: letteranne-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/letteranne_dev
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: letteranne-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    container_name: letteranne-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: letteranne_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d letteranne_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  frontend_node_modules:

