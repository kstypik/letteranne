name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: letteranne_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d letteranne_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/pyproject.toml ]; then pip install -e backend; fi
          pip install ruff pytest pytest-django

      - name: Ruff lint
        run: |
          if [ -d backend ]; then ruff check backend; else echo "backend/ not present yet"; fi

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/letteranne_test
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: |
          if [ -d backend/tests ]; then pytest backend/tests; else echo "No backend tests yet"; fi

  frontend:
    name: Frontend Lint Type and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm install --frozen-lockfile || pnpm install
          else
            echo "frontend/package.json not present yet"
          fi

      - name: Frontend lint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm run lint --if-present
          else
            echo "Skip lint - frontend not scaffolded"
          fi

      - name: Frontend type check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm run typecheck --if-present
          else
            echo "Skip typecheck - frontend not scaffolded"
          fi

      - name: Frontend tests
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm run test --if-present
          else
            echo "Skip tests - frontend not scaffolded"
          fi

