name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: letteranne_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d letteranne_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/pyproject.toml ]; then pip install -e backend; fi
          pip install ruff pytest pytest-django

      - name: Ruff lint
        run: |
          if [ -d backend ]; then ruff check backend; else echo "backend/ not present yet"; fi

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/letteranne_test
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: |
          if [ -d backend/tests ]; then pytest backend/tests; else echo "No backend tests yet"; fi

  frontend:
    name: Frontend Lint Type and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm install --frozen-lockfile || pnpm install
          else
            echo "frontend/package.json not present yet"
          fi

      - name: Frontend lint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm run lint --if-present
          else
            echo "Skip lint - frontend not scaffolded"
          fi

      - name: Frontend type check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm run typecheck --if-present
          else
            echo "Skip typecheck - frontend not scaffolded"
          fi

      - name: Frontend tests
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            pnpm run test --if-present
          else
            echo "Skip tests - frontend not scaffolded"
          fi

      - name: OpenAPI client generation consistency
        run: |
          if [ -f frontend/orval.config.ts ]; then
            cd frontend
            pnpm run api:generate
            git diff --exit-code src/api/openapi-generated.ts
          else
            echo "Skip OpenAPI consistency check - orval config not present"
          fi

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: backend-prod
          tags: letteranne:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Setup frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile || pnpm install

      - name: Install Playwright browser deps
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: pnpm --dir frontend dlx wait-on http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: pnpm --dir frontend run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/

      - name: Stop services
        run: docker compose down
        if: always()

